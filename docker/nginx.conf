##############################################################################
#  FUTURE VIP — Nginx Production Configuration
#  Handles: rate limiting, gzip, API proxy, static files, WebSocket, SSL/TLS,
#           and security headers.
##############################################################################

user nginx;
worker_processes auto;
worker_rlimit_nofile 65535;
pid /var/run/nginx.pid;

error_log /var/log/nginx/error.log warn;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    ##########################################################################
    #  Basic Settings
    ##########################################################################
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    charset       utf-8;
    server_tokens off;  # Hide nginx version

    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   65;
    keepalive_requests  100;
    types_hash_max_size 2048;
    client_max_body_size 50M;   # Allow large resume uploads

    ##########################################################################
    #  Logging
    ##########################################################################
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct=$upstream_connect_time '
                    'uht=$upstream_header_time urt=$upstream_response_time';

    access_log /var/log/nginx/access.log main;

    ##########################################################################
    #  Gzip Compression
    ##########################################################################
    gzip               on;
    gzip_vary          on;
    gzip_proxied       any;
    gzip_comp_level    6;
    gzip_min_length    1024;
    gzip_buffers       16 8k;
    gzip_http_version  1.1;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/xml+rss
        application/atom+xml
        image/svg+xml
        font/truetype
        font/opentype
        application/vnd.ms-fontobject;

    ##########################################################################
    #  Rate Limiting
    ##########################################################################
    # General rate limit: 10 requests/second per IP
    limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;

    # Stricter limit for auth endpoints: 5 requests/minute per IP
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

    # API limit: 30 requests/second per IP
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

    limit_req_status 429;

    ##########################################################################
    #  Upstream Definitions
    ##########################################################################
    upstream backend {
        # FastAPI/Uvicorn backend instances
        server backend:8000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream frontend {
        # React/Nginx static file server
        server frontend:80 max_fails=3 fail_timeout=30s;
        keepalive 16;
    }

    ##########################################################################
    #  SSL/TLS Configuration (shared; enabled per-server block)
    ##########################################################################
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;
    ssl_stapling              on;
    ssl_stapling_verify       on;

    ##########################################################################
    #  HTTP → HTTPS Redirect (uncomment in production with SSL)
    ##########################################################################
    # server {
    #     listen 80;
    #     listen [::]:80;
    #     server_name futurevip.ai www.futurevip.ai;
    #
    #     # Let's Encrypt ACME challenge
    #     location /.well-known/acme-challenge/ {
    #         root /var/www/certbot;
    #     }
    #
    #     location / {
    #         return 301 https://$host$request_uri;
    #     }
    # }

    ##########################################################################
    #  Main HTTP Server Block
    #  Replace with HTTPS block below once SSL certs are provisioned
    ##########################################################################
    server {
        listen 80;
        listen [::]:80;
        server_name localhost futurevip.ai www.futurevip.ai;

        ##################################################################
        #  Security Headers
        ##################################################################
        add_header X-Frame-Options           "SAMEORIGIN"              always;
        add_header X-Content-Type-Options    "nosniff"                 always;
        add_header X-XSS-Protection          "1; mode=block"           always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy
            "default-src 'self'; "
            "script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net; "
            "style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; "
            "font-src 'self' https://fonts.gstatic.com; "
            "img-src 'self' data: https:; "
            "connect-src 'self' wss: ws: https:; "
            "frame-ancestors 'none';"
            always;

        # HSTS — uncomment after SSL is confirmed working
        # add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        ##################################################################
        #  Rate Limiting on Auth Endpoints
        ##################################################################
        location ~ ^/api/v1/(auth|users/login|users/register) {
            limit_req zone=auth burst=10 nodelay;
            limit_req_log_level warn;

            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        ##################################################################
        #  API Proxy → FastAPI Backend
        ##################################################################
        location /api/ {
            limit_req zone=api burst=50 nodelay;

            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";  # Enable keepalive
            proxy_read_timeout 120s;
            proxy_connect_timeout 10s;
            proxy_send_timeout 60s;

            # Buffer settings for large AI responses
            proxy_buffer_size        16k;
            proxy_buffers            8 32k;
            proxy_busy_buffers_size  64k;
        }

        ##################################################################
        #  OpenAPI Docs (FastAPI built-in)
        ##################################################################
        location ~ ^/(docs|redoc|openapi.json) {
            limit_req zone=general burst=20 nodelay;
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Host            $host;
            proxy_set_header   X-Real-IP       $remote_addr;
        }

        ##################################################################
        #  Health Check
        ##################################################################
        location /health {
            proxy_pass         http://backend/health;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            access_log         off;
        }

        ##################################################################
        #  WebSocket Support (for future real-time features)
        ##################################################################
        location /ws/ {
            proxy_pass              http://backend;
            proxy_http_version      1.1;
            proxy_set_header        Upgrade    $http_upgrade;
            proxy_set_header        Connection "upgrade";
            proxy_set_header        Host       $host;
            proxy_set_header        X-Real-IP  $remote_addr;
            proxy_read_timeout      3600s;  # 1 hour for long-lived WS connections
            proxy_send_timeout      3600s;
            proxy_connect_timeout   10s;
        }

        ##################################################################
        #  Static File Upload Serving
        ##################################################################
        location /uploads/ {
            alias /app/uploads/;
            expires 30d;
            add_header Cache-Control "public, no-transform";
            # Security: only serve known file types
            location ~* \.(pdf|docx|doc|txt|png|jpg|jpeg)$ {
                expires 30d;
            }
            location ~ / {
                deny all;
            }
        }

        ##################################################################
        #  Frontend Static Files → React App
        ##################################################################
        location / {
            limit_req zone=general burst=30 nodelay;

            proxy_pass         http://frontend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;

            # SPA fallback: all 404s go to index.html
            proxy_intercept_errors on;
            error_page 404 = @frontend_fallback;
        }

        location @frontend_fallback {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
        }

        ##################################################################
        #  Error Pages
        ##################################################################
        error_page 429 /429.html;
        location = /429.html {
            return 429 '{"error":"Too many requests. Please slow down."}';
            add_header Content-Type application/json;
        }

        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            return 502 '{"error":"Service temporarily unavailable."}';
            add_header Content-Type application/json;
        }
    }

    ##########################################################################
    #  HTTPS Server Block — Uncomment when SSL is provisioned
    ##########################################################################
    # server {
    #     listen 443 ssl http2;
    #     listen [::]:443 ssl http2;
    #     server_name futurevip.ai www.futurevip.ai;
    #
    #     # Let's Encrypt certificates (managed by Certbot)
    #     ssl_certificate     /etc/letsencrypt/live/futurevip.ai/fullchain.pem;
    #     ssl_certificate_key /etc/letsencrypt/live/futurevip.ai/privkey.pem;
    #     ssl_trusted_certificate /etc/letsencrypt/live/futurevip.ai/chain.pem;
    #
    #     add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    #
    #     # Include all location blocks from HTTP server above
    # }
}
