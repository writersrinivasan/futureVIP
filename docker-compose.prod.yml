version: "3.8"

# Production overrides for docker-compose.yml
# Usage: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  postgres:
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    # Do not expose port publicly in production; use internal networking only
    ports: []

  redis:
    restart: always
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
      --save 60 1000
      --requirepass ${REDIS_PASSWORD}
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M
    ports: []

  chromadb:
    restart: always
    environment:
      CHROMA_SERVER_AUTH_CREDENTIALS_FILE: /chroma/auth/server.htpasswd
      CHROMA_SERVER_AUTH_PROVIDER: chromadb.auth.basic.BasicAuthServerProvider
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 1G
    ports: []

  backend:
    restart: always
    # Production: no --reload flag, use multiple workers
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --workers 4
      --worker-class uvicorn.workers.UvicornWorker
      --access-log
      --log-level warning
    volumes:
      - upload_data:/app/uploads
      # Do NOT mount source code in production
    environment:
      ENVIRONMENT: production
      DEBUG: "false"
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "1.0"
          memory: 1G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  celery_worker:
    restart: always
    command: >
      celery -A app.tasks.celery_app worker
      --loglevel=warning
      --concurrency=8
      -Q default,ai_tasks,notifications
      --max-tasks-per-child=100
    volumes:
      - upload_data:/app/uploads
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "1.0"
          memory: 1G
    healthcheck:
      test: ["CMD", "celery", "-A", "app.tasks.celery_app", "inspect", "ping", "-d", "celery@$$HOSTNAME"]
      interval: 60s
      timeout: 30s
      retries: 3
      start_period: 60s

  celery_beat:
    restart: always
    command: >
      celery -A app.tasks.celery_app beat
      --loglevel=warning
      --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes: []
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 128M

  # Flower is excluded from production for security
  # Monitor Celery via CloudWatch/Datadog/Prometheus instead
  flower:
    deploy:
      replicas: 0

  frontend:
    restart: always
    # Production: serve pre-built static files via nginx
    command: []
    build:
      target: production
    environment:
      NODE_ENV: production
    volumes: []
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.25"
          memory: 128M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ─────────────────────────────────────────────
  #  Nginx Reverse Proxy (production only)
  # ─────────────────────────────────────────────
  nginx:
    build:
      context: ./docker
      dockerfile: Dockerfile.nginx
    container_name: futurevip_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
      # Uncomment for Let's Encrypt SSL:
      # - /etc/letsencrypt:/etc/letsencrypt:ro
      # - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 64M
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - futurevip-network

networks:
  futurevip-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  chroma_data:
  upload_data:
