# =============================================================================
#  FUTURE VIP — Alembic Configuration
#  Alembic manages schema migrations for the FastAPI/SQLAlchemy backend.
#  Migrations live in: backend/app/db/migrations/
# =============================================================================

[alembic]
# Path to migration scripts directory (relative to backend/)
script_location = app/db/migrations

# Template used to generate migration file names
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# sys.path setting when alembic is invoked
prepend_sys_path = .

# Timezone to use when rendering the date within the migration file
# as well as the filename.
# Specify "local" to use the local machine timezone
timezone = UTC

# Max length of characters to apply to the
# "slug" field
truncate_slug_length = 40

# Set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
revision_environment = false

# Set to 'true' to allow .pyc and .pyo files without
# a source .py file to be detected as revisions in the
# versions/ directory
sourceless = false

# Version table name — stores migration history
version_table = alembic_version

# Version locations — can be a newline-separated list for branch merges
version_locations = %(here)s/app/db/migrations/versions

# The output encoding used when revision files are written from
# "script.py.mako"
output_encoding = utf-8

# DATABASE URL — overridden at runtime by env.py reading from settings
# Do NOT commit real credentials here; env.py reads from environment variables.
sqlalchemy.url = postgresql+asyncpg://futurevip:changeme_in_prod@localhost:5432/future_vip

# =============================================================================
#  Logging Configuration
# =============================================================================

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
