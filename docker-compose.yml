version: "3.8"

services:
  # ─────────────────────────────────────────────
  #  PostgreSQL 16
  # ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: futurevip_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-future_vip}
      POSTGRES_USER: ${POSTGRES_USER:-futurevip}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_in_prod}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-futurevip} -d ${POSTGRES_DB:-future_vip}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - futurevip-network

  # ─────────────────────────────────────────────
  #  Redis 7
  # ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: futurevip_redis
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
      --save 60 1000
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - futurevip-network

  # ─────────────────────────────────────────────
  #  ChromaDB (Vector Store)
  # ─────────────────────────────────────────────
  chromadb:
    image: chromadb/chroma:latest
    container_name: futurevip_chromadb
    restart: unless-stopped
    environment:
      CHROMA_SERVER_HOST: "0.0.0.0"
      CHROMA_SERVER_HTTP_PORT: "8001"
      ANONYMIZED_TELEMETRY: "false"
      ALLOW_RESET: "true"
    ports:
      - "8001:8001"
    volumes:
      - chroma_data:/chroma/chroma
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/v1/heartbeat"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - futurevip-network

  # ─────────────────────────────────────────────
  #  FastAPI Backend
  # ─────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: futurevip_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-futurevip}:${POSTGRES_PASSWORD:-changeme_in_prod}@postgres:5432/${POSTGRES_DB:-future_vip}
      REDIS_URL: redis://redis:6379/0
      CHROMA_HOST: chromadb
      CHROMA_PORT: "8001"
    ports:
      - "8000:8000"
    volumes:
      - upload_data:/app/uploads
      - ./backend:/app:cached
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      chromadb:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app
    networks:
      - futurevip-network

  # ─────────────────────────────────────────────
  #  Celery Worker
  # ─────────────────────────────────────────────
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: futurevip_celery_worker
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-futurevip}:${POSTGRES_PASSWORD:-changeme_in_prod}@postgres:5432/${POSTGRES_DB:-future_vip}
      REDIS_URL: redis://redis:6379/0
      CHROMA_HOST: chromadb
      CHROMA_PORT: "8001"
    volumes:
      - upload_data:/app/uploads
      - ./backend:/app:cached
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      chromadb:
        condition: service_healthy
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=4 -Q default,ai_tasks,notifications
    networks:
      - futurevip-network

  # ─────────────────────────────────────────────
  #  Celery Beat (Scheduler)
  # ─────────────────────────────────────────────
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: futurevip_celery_beat
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-futurevip}:${POSTGRES_PASSWORD:-changeme_in_prod}@postgres:5432/${POSTGRES_DB:-future_vip}
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backend:/app:cached
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.tasks.celery_app beat --loglevel=info
    networks:
      - futurevip-network

  # ─────────────────────────────────────────────
  #  Flower (Celery Monitoring)
  # ─────────────────────────────────────────────
  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: futurevip_flower
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      REDIS_URL: redis://redis:6379/0
    ports:
      - "5555:5555"
    depends_on:
      redis:
        condition: service_healthy
    command: celery -A app.tasks.celery_app flower --port=5555 --address=0.0.0.0
    networks:
      - futurevip-network

  # ─────────────────────────────────────────────
  #  React Frontend
  # ─────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: futurevip_frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:8000
      VITE_WS_URL: ws://localhost:8000
      NODE_ENV: development
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app:cached
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - futurevip-network

# ─────────────────────────────────────────────
#  Networks
# ─────────────────────────────────────────────
networks:
  futurevip-network:
    driver: bridge
    name: futurevip-network

# ─────────────────────────────────────────────
#  Volumes
# ─────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
    name: futurevip_postgres_data
  redis_data:
    driver: local
    name: futurevip_redis_data
  chroma_data:
    driver: local
    name: futurevip_chroma_data
  upload_data:
    driver: local
    name: futurevip_upload_data
